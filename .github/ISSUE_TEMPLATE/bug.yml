name: Bug
description: Something is broken
labels: ["bug"]
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behaviour
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: >
        Paste the exact command you ran and its full output verbatim.
        A description without evidence has zero diagnostic value.
      placeholder: |
        $ <command you ran>

        <full output pasted here>
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Runtime version:
        Relevant config:
    validations:
      required: false
